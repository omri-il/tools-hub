<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הכלים של עומרי אירם</title>
  <meta name="description" content="אוסף כלים חינמיים שבניתי כדי לעזור למורים, יוצרי תוכן ומשתמשי AI לעבוד מהר יותר." />
  <meta property="og:title" content="הכלים של עומרי אירם" />
  <meta property="og:description" content="אוסף כלים חינמיים — סרגל פרקים ליוטיוב, מענה המוני ב-Gmail, תמלול אוטומטי לסרטונים, הגרלת זוכה, מחולל אימייל אוטומטי לטופס, ועוד." />
  <meta property="og:locale" content="he_IL" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=2" />
  <style>
    /* Admin-only tools: hidden until admin mode is unlocked, then shown in a distinct purple identity */
    body:not(.admin) .admin-only { display: none !important; }
    /* admin / private tools get a distinct light-orange identity */
    .tool-card.admin-only {
      border-color: rgba(251,146,60,0.55);
      background: linear-gradient(180deg, rgba(251,146,60,0.13), rgba(251,146,60,0.02));
    }
    .tool-card.admin-only:hover { border-color: #fb923c; }
    .tool-card.admin-only .tag { border-color: rgba(251,146,60,0.55); color: #fdba74; }
    #adminChip {
      position: fixed; inset-block-end: 16px; inset-inline-start: 16px; z-index: 60;
      display: none; align-items: center; gap: 10px;
      background: rgba(251,146,60,0.18); border: 1px solid rgba(251,146,60,0.6);
      color: #fdba74; padding: 8px 14px; border-radius: 999px;
      font-family: 'Heebo', sans-serif; font-size: 0.82rem; font-weight: 600;
    }
    body.admin #adminChip { display: flex; }
    #adminChip a, #adminChip button {
      background: none; border: none; color: #fff; cursor: pointer;
      font-weight: 700; font-size: 0.82rem; text-decoration: none;
    }
    #adminChip a:hover, #adminChip button:hover { opacity: .85; }
    /* tool categories */
    .cat-section { margin: 0 auto 30px; max-width: 1100px; }
    .cat { font-size: 1.12rem; font-weight: 700; margin: 0 0 16px; padding-bottom: 9px; opacity: .92;
           border-bottom: 1px solid rgba(255,255,255,0.10); }
    body:not(.admin) .cat-section.admin-only { display: none !important; }
    #hubMsg { text-align: center; color: var(--text-dim); font-family: 'Heebo', sans-serif;
              padding: 40px 20px; }
    #statsPanel .stats-msg { opacity: .7; font-family: 'Heebo', sans-serif; }
    .stats-table { width: 100%; border-collapse: collapse; font-family: 'Heebo', sans-serif; }
    .stats-table th, .stats-table td { text-align: right; padding: 9px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08); font-size: .92rem; white-space: nowrap; }
    .stats-table th { opacity: .7; font-weight: 600; font-size: .82rem; }
    .stats-table td.num { font-variant-numeric: tabular-nums; }
    .stats-table .spark { stroke: #a78bfa; fill: none; stroke-width: 1.5; }
    .stats-table tbody tr:hover { background: rgba(255,255,255,0.03); }
  </style>
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="site-header">
    <div class="brand">
      <span class="brand-mark">OI</span>
      <span class="brand-name">עומרי אירם</span>
    </div>
    <h1>הכלים שבניתי</h1>
    <p class="tagline">אוסף כלים חינמיים שעוזרים לי בעבודה היומיומית — ומוצאים את הדרך לעוד אנשים. הכל רץ ישר בדפדפן או בחשבון שלכם, בלי להתקין כלום.</p>
  </header>

  <main aria-label="כלים">

    <!-- Stats panel hidden by request (2026-07-19). To bring it back: remove
         the `hidden` attribute — the render JS keys off it and will resume. -->
    <section id="statsPanel" class="cat-section admin-only" aria-label="סטטיסטיקה" hidden>
      <h2 class="cat">📊 סטטיסטיקה — שימוש בכלים</h2>
      <div id="statsBody"><p class="stats-msg">טוען…</p></div>
    </section>

    <!-- Tool categories/cards render here from the editable hub config
         (go-shortener /api/hub-config). Edit them at /admin/. -->
    <div id="hubRoot"></div>

  </main>

  <footer class="site-footer">
    <p>בנוי בעברית, בשבילכם · <a href="mailto:hello@omri-iram.co.il">hello@omri-iram.co.il</a></p>
    <p class="version-tag">גרסה 1.0.0</p>
  </footer>

  <div id="adminChip">🔓 מצב אדמין
    <a href="admin/">✏️ עריכה</a>
    <button id="adminExit" type="button">יציאה</button>
  </div>

  <script src="js/hub-render.js?v=1"></script>

  <script>
    // ---- Bootstrap: fetch the editable hub config and render it. -----------
    // Renders instantly from a localStorage cache (no blank flash), then
    // refreshes from the backend. Sends the shared omri_session token when
    // present so the admin sees admin/hidden-excluded content correctly.
    (function () {
      function lsGet0(k){ try { return localStorage.getItem(k); } catch (_) { return null; } }
      var API_BASE = (lsGet0('hub_api_base') || 'https://go.omri-iram.co.il').replace(/\/$/, '');
      var CONFIG_URL = API_BASE + '/api/hub-config';
      var CACHE_KEY = 'hub_config_cache';
      var hubRoot = document.getElementById('hubRoot');
      var statsLoaded = false;

      function lsGet(k){ try { return localStorage.getItem(k); } catch (_) { return null; } }
      function lsSet(k, v){ try { localStorage.setItem(k, v); } catch (_) {} }

      // A Google sign-in redirect may land back here with #omri_session=… .
      (function captureToken(){
        try {
          var m = (location.hash || '').match(/(?:^#|&)omri_session=([^&]+)/);
          if (m) {
            localStorage.setItem('omri_session', decodeURIComponent(m[1]));
            history.replaceState(null, '', location.pathname + location.search);
          }
        } catch (_) {}
      })();

      function renderConfig(cfg) {
        if (!cfg || !cfg.categories) return false;
        window.HubRender.applyLayout(hubRoot, cfg);
        hubRoot.innerHTML = '';
        hubRoot.appendChild(window.HubRender.renderHub(cfg));
        maybeRenderStats();
        return true;
      }

      function showMessage(msg) {
        if (hubRoot.querySelector('.tool-card')) return;   // keep cached content
        hubRoot.innerHTML = '<p id="hubMsg">' + msg + '</p>';
      }

      // 1) Immediate paint from cache.
      var cached = lsGet(CACHE_KEY);
      if (cached) { try { renderConfig(JSON.parse(cached)); } catch (_) {} }

      // 2) Fresh fetch.
      var session = lsGet('omri_session') || '';
      var headers = {};
      if (session) headers['X-Session'] = session;
      fetch(CONFIG_URL, { headers: headers })
        .then(function (r) { return r.json(); })
        .then(function (cfg) {
          if (renderConfig(cfg)) { lsSet(CACHE_KEY, JSON.stringify(cfg)); }
        })
        .catch(function () {
          if (!cached) showMessage('לא ניתן לטעון את הכלים כרגע. נסו לרענן את הדף.');
        });

      // ---- Usage analytics (event delegation → works for rendered cards) ----
      var DEBOUNCE_MS = 5000;
      var TRACK_URL = API_BASE + '/api/track';
      document.addEventListener('click', function (e) {
        var card = e.target && e.target.closest ? e.target.closest('.tool-card[data-tool]') : null;
        if (!card) return;
        var toolId = card.getAttribute('data-tool');
        try {
          var key = 'tt_last_' + toolId, now = Date.now(), last = Number(lsGet(key) || 0);
          if (now - last < DEBOUNCE_MS) return;
          lsSet(key, String(now));
          var h = { 'Content-Type': 'application/json' };
          var s = lsGet('omri_session') || '';
          if (s) h['X-Session'] = s;
          fetch(TRACK_URL, { method: 'POST', keepalive: true, headers: h,
            body: JSON.stringify({ tool: toolId }) }).catch(function () {});
        } catch (_) { /* analytics must never break the page */ }
      });

      // ---- Admin usage table (only in admin mode; runs once, post-render) ---
      function maybeRenderStats() {
        // The panel's `hidden` attribute is the on/off switch — when the admin
        // decides to hide the stats section, skip the /api/stats fetch too.
        var panel = document.getElementById('statsPanel');
        if (!panel || panel.hidden) return;
        if (statsLoaded) return;
        var isAdmin = false;
        try { isAdmin = localStorage.getItem('omri_admin') === '1'; } catch (_) {}
        if (!isAdmin) return;
        statsLoaded = true;
        renderStatsPanel();
      }

      function renderStatsPanel() {
        var STATS_URL = API_BASE + '/api/stats';
        var names = {};
        var cards = document.querySelectorAll('.tool-card[data-tool]');
        for (var i = 0; i < cards.length; i++) {
          var t = cards[i].querySelector('.tool-title');
          names[cards[i].getAttribute('data-tool')] =
            t ? t.textContent.trim() : cards[i].getAttribute('data-tool');
        }
        function esc(s) { return String(s).replace(/[&<>"]/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
        function sparkline(daily) {
          var pts = (daily || []).slice(-30).map(function (d) { return d.total; });
          if (pts.length < 2) return '';
          var w = 90, h = 22, max = Math.max.apply(null, pts) || 1;
          var step = w / (pts.length - 1);
          var d = pts.map(function (v, i) {
            var x = (i * step).toFixed(1);
            var y = (h - 2 - (v / max) * (h - 4)).toFixed(1);
            return (i ? 'L' : 'M') + x + ' ' + y;
          }).join(' ');
          return '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h +
                 '" aria-hidden="true"><path class="spark" d="' + d + '"/></svg>';
        }
        function render(tools) {
          var body = document.getElementById('statsBody');
          if (!tools || !tools.length) { body.innerHTML = '<p class="stats-msg">אין עדיין נתונים.</p>'; return; }
          var rows = tools.map(function (t) {
            return '<tr><td>' + esc(names[t.tool] || t.tool) + '</td>' +
              '<td class="num">' + t.total + '</td>' +
              '<td class="num">' + t.me + '</td>' +
              '<td class="num">' + t.visitors + '</td>' +
              '<td>' + sparkline(t.daily) + '</td></tr>';
          }).join('');
          body.innerHTML = '<table class="stats-table"><thead><tr>' +
            '<th>כלי</th><th>סה״כ</th><th>שלי</th><th>מבקרים</th><th>מגמה (30 ימים)</th>' +
            '</tr></thead><tbody>' + rows + '</tbody></table>';
        }
        var s = lsGet('omri_session') || '';
        var h = {};
        if (s) h['X-Session'] = s;
        fetch(STATS_URL, { headers: h })
          .then(function (r) { if (r.status === 401) throw new Error('unauth'); return r.json(); })
          .then(function (j) { render(j.tools); })
          .catch(function (e) {
            document.getElementById('statsBody').innerHTML = '<p class="stats-msg">' +
              (e && e.message === 'unauth'
                ? 'צריך להתחבר עם Google כדי לראות סטטיסטיקה.'
                : 'לא ניתן לטעון סטטיסטיקה כרגע.') + '</p>';
          });
      }
    })();
  </script>

  <script>
    // Hidden admin unlock: triple-click the "OI" logo within ~1.2s → PIN → reveals admin tools.
    // Client-side obscurity only; the private tools themselves are protected at their own endpoints,
    // and admin/hidden cards are stripped server-side for anyone without a valid omri_session token.
    (function () {
      var KEY = 'omri_admin', CODE = '9464';
      function lsGet(k){ try { return localStorage.getItem(k); } catch (_) { return null; } }
      function lsSet(k, v){ try { localStorage.setItem(k, v); } catch (_) {} }
      function lsDel(k){ try { localStorage.removeItem(k); } catch (_) {} }
      if (lsGet(KEY) === '1') document.body.classList.add('admin');
      var mark = document.querySelector('.brand-mark');
      var clicks = 0, timer = null;
      if (mark) {
        mark.addEventListener('click', function () {
          clicks++; clearTimeout(timer); timer = setTimeout(function () { clicks = 0; }, 1200);
          if (clicks >= 3) {
            clicks = 0;
            if (document.body.classList.contains('admin')) return;
            var c = prompt('קוד אדמין:');
            if (c === CODE) { lsSet(KEY, '1'); document.body.classList.add('admin'); location.reload(); }
            else if (c !== null) { alert('קוד שגוי'); }
          }
        });
      }
      var exit = document.getElementById('adminExit');
      if (exit) exit.addEventListener('click', function () {
        lsDel(KEY); document.body.classList.remove('admin');
      });
    })();
  </script>

</body>
</html>
