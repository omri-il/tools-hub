<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>הקלטות שיחות — Extra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root{ --bg:#0c0d10; --card:#14161b; --panel:#0f1115; --ink:#ecedf0; --muted:#aab0b9; --faint:#6c727c;
           --line:rgba(255,255,255,0.09); --accent:#fb923c; --accent2:#f97316; font-family:'Heebo',system-ui,sans-serif; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:radial-gradient(90% 60% at 50% -10%,rgba(251,146,60,0.08),transparent 60%),var(--bg);color:var(--ink);min-height:100vh;padding:30px 22px 70px;line-height:1.5}
    .wrap{max-width:820px;margin:0 auto}
    .back{display:inline-block;color:var(--faint);text-decoration:none;font-size:.85rem;margin-bottom:18px}
    .masthead{text-align:center;margin-bottom:26px}
    .kicker{font-size:.74rem;font-weight:700;letter-spacing:.06em;color:var(--accent)}
    h1{font-weight:900;font-size:clamp(1.8rem,5vw,2.6rem);margin-top:10px}
    h1 .em{color:var(--accent)}
    .lede{color:var(--muted);font-weight:300;margin:12px auto 0;max-width:520px}
    .sheet{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .tab{background:var(--panel);border:1px solid var(--line);border-radius:999px;color:var(--muted);padding:8px 16px;cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:600}
    .tab.active{background:var(--accent);color:#2a1500;border-color:var(--accent)}
    label{display:block;font-weight:600;font-size:.86rem;margin-bottom:6px}
    input[type=text],input[type=date]{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-family:inherit;font-size:.96rem;padding:11px 13px}
    input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(251,146,60,0.16)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .pane{display:none;margin-bottom:14px} .pane.active{display:block}
    .btn{font-family:inherit;font-weight:700;border:1px solid transparent;border-radius:10px;cursor:pointer;padding:11px 20px;font-size:.92rem}
    .btn-primary{background:var(--accent);color:#2a1500} .btn-primary:hover{background:var(--accent2)}
    .btn-ghost{background:transparent;color:var(--muted);border-color:var(--line)} .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
    .msg{margin-top:12px;color:var(--faint);font-size:.86rem;min-height:1em}
    .call{border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:12px}
    .call .top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:baseline}
    .call .num{font-weight:700;direction:ltr}
    .call .meta{color:var(--faint);font-size:.82rem}
    .call .gist{color:var(--muted);font-size:.88rem;margin-top:6px;font-style:italic}
    .call .acts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
    .call audio{height:34px}
    .notice{text-align:center;color:var(--muted);background:rgba(251,146,60,0.07);border:1px solid var(--line);border-radius:12px;padding:20px;margin-top:20px}
    footer{margin-top:40px;color:var(--faint);font-size:.82rem;text-align:center}
    footer a{color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../">→ חזרה לכל הכלים</a>
    <div class="masthead">
      <div class="kicker">הכלים של עומרי אירם · אדמין</div>
      <h1>הקלטות שיחות <span class="em">Extra</span></h1>
      <p class="lede">חיפוש והאזנה להקלטות שיחות ממערכת אקסטרה — לפי טלפון, תאריך, שם, או השיחות האחרונות.</p>
    </div>

    <div id="app" style="display:none">
      <div class="sheet">
        <div class="tabs">
          <button class="tab active" data-mode="recent" type="button">אחרונות</button>
          <button class="tab" data-mode="phone" type="button">טלפון</button>
          <button class="tab" data-mode="date" type="button">תאריך</button>
          <button class="tab" data-mode="name" type="button">שם איש קשר</button>
        </div>
        <div class="pane active" data-pane="recent"><label>כמה שיחות אחרונות?</label><input type="text" id="recentN" value="10" /></div>
        <div class="pane" data-pane="phone"><label>מספר טלפון</label><input type="text" id="phone" dir="ltr" placeholder="052-1234567" /></div>
        <div class="pane" data-pane="date">
          <div class="row">
            <div><label>מתאריך</label><input type="date" id="dateFrom" /></div>
            <div><label>עד תאריך</label><input type="date" id="dateTo" /></div>
          </div>
        </div>
        <div class="pane" data-pane="name"><label>שם איש קשר</label><input type="text" id="name" placeholder="לדוגמה: דנה" /></div>
        <button class="btn btn-primary" id="searchBtn" type="button">חיפוש</button>
        <div class="msg" id="msg"></div>
      </div>
      <div id="results"></div>
    </div>

    <div class="notice" id="lockNotice" style="display:none">
      כלי אדמין. שלוש לחיצות על הכותרת "הכלים של עומרי אירם · אדמין" כדי להיכנס.
    </div>

    <footer><p>פרטי · הקלטות שיחות נשארות בחשבון שלך. מבית <a href="https://tools.omri-iram.co.il">הכלים של עומרי אירם</a></p></footer>
  </div>

  <script>
    const $=id=>document.getElementById(id);
    const API='https://go.omri-iram.co.il/extra/api';
    function isAdmin(){ try{return localStorage.getItem('omri_admin')==='1';}catch(_){return false;} }

    // admin unlock on this page too
    (function(){ const k=document.querySelector('.kicker'); if(!k)return; let c=0,t=null;
      k.addEventListener('click',()=>{ c++; clearTimeout(t); t=setTimeout(()=>c=0,1200);
        if(c>=3){ c=0; if(isAdmin())return; const v=prompt('קוד אדמין:');
          if(v==='9464'){ try{localStorage.setItem('omri_admin','1');}catch(_){}; location.reload(); } else if(v!==null){ alert('קוד שגוי'); } } });
    })();

    function pwGet(){ try{return localStorage.getItem('extra_pw')||'';}catch(_){return '';} }
    function pwSet(p){ try{localStorage.setItem('extra_pw',p);}catch(_){ } }
    function pwClear(){ try{localStorage.removeItem('extra_pw');}catch(_){ } }
    async function apiFetch(path,opts){
      opts=opts||{}; let pw=pwGet(); if(!pw){ pw=prompt('סיסמת מערכת ההקלטות:')||''; if(pw)pwSet(pw); }
      const mk=p=>Object.assign({},opts,{headers:Object.assign({},opts.headers||{},{'X-Admin-Password':p})});
      let r=await fetch(API+path,mk(pw));
      if(r.status===401){ pwClear(); const p2=prompt('סיסמה שגויה — הזינו שוב:')||''; if(p2){ pwSet(p2); r=await fetch(API+path,mk(p2)); } }
      return r;
    }

    // tabs
    let mode='recent';
    document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
      mode=t.dataset.mode;
      document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));
      document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.dataset.pane===mode));
    }));

    function fmtDur(s){ s=s||0; return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

    async function doSearch(){
      const msg=$('msg'), res=$('results'); res.innerHTML=''; msg.textContent='מחפש…';
      const body={};
      if(mode==='recent') body.items=parseInt($('recentN').value||'10',10);
      if(mode==='phone') body.phone=$('phone').value.trim();
      if(mode==='date'){ if($('dateFrom').value) body.date_from=$('dateFrom').value+' 00:00:00'; if($('dateTo').value) body.date_to=$('dateTo').value+' 23:59:59'; }
      if(mode==='name') body.contact_name=$('name').value.trim();
      let r; try{ r=await apiFetch('/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); }
      catch(e){ msg.textContent='שגיאת רשת.'; return; }
      if(r.status===401){ msg.textContent='סיסמה שגויה. רעננו ונסו שוב.'; return; }
      const j=await r.json().catch(()=>({}));
      if(!r.ok){ msg.textContent='שגיאה: '+(j.error||r.status); return; }
      const calls=j.calls||[];
      msg.textContent = calls.length? (calls.length+' שיחות') : 'לא נמצאו שיחות.';
      calls.forEach(c=>res.appendChild(renderCall(c)));
    }

    function renderCall(c){
      const d=document.createElement('div'); d.className='call';
      const dir = c.type==='incoming' ? '📞 נכנסת' : '📱 יוצאת';
      d.innerHTML =
        '<div class="top"><span class="num">'+(c.number||'?')+(c.contact?(' · '+c.contact):'')+'</span>'+
        '<span class="meta">'+dir+' · '+(c.start||'')+' · '+fmtDur(c.duration)+' דק׳</span></div>'+
        (c.gist?('<div class="gist">🤖 '+c.gist+'</div>'):'')+
        '<div class="acts"><button class="btn btn-ghost play" type="button">▶ האזן</button>'+
        '<button class="btn btn-ghost dl" type="button">⬇ הורד</button><span class="meta st"></span></div>';
      const st=d.querySelector('.st');
      async function getBlob(){
        st.textContent='טוען…';
        const r=await apiFetch('/download?call_id='+encodeURIComponent(c.id));
        if(!r.ok){ st.textContent = r.status===404?'אין הקלטה':'שגיאה'; return null; }
        st.textContent=''; return await r.blob();
      }
      d.querySelector('.play').addEventListener('click',async()=>{
        const b=await getBlob(); if(!b)return;
        const a=document.createElement('audio'); a.controls=true; a.src=URL.createObjectURL(b);
        d.querySelector('.acts').appendChild(a); a.play();
      });
      d.querySelector('.dl').addEventListener('click',async()=>{
        const b=await getBlob(); if(!b)return;
        const u=URL.createObjectURL(b), a=document.createElement('a');
        a.href=u; a.download='recording_'+c.id+'.mp3'; document.body.appendChild(a); a.click(); a.remove();
      });
      return d;
    }

    if(isAdmin()){ $('app').style.display='block'; $('searchBtn').addEventListener('click',doSearch); }
    else { $('lockNotice').style.display='block'; }
  </script>
</body>
</html>
